# ABS Data Explorer — nginx reverse proxy config
# Replace YOUR_DOMAIN_OR_IP with your domain or VPS IP address.
# Copy to: /etc/nginx/sites-available/abs-dashboard
# Then: ln -s /etc/nginx/sites-available/abs-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Streamlit requires WebSocket support — these headers are mandatory
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_buffering    off;
    }

    # Streamlit static assets
    location /_stcore/stream {
        proxy_pass         http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
